name: .NET Test Coverage

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    # Run tests and export coverage report into 'lcov' format
    - name: Test and Collect Coverage
      run: dotnet test --no-build --collect:"XPlat Code Coverage;Format=lcov"

    # Upload the lcov file using the official Coveralls Action
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: '**/test/StellarForge.OpenApi.FluentValidation.Tests/TestResults/*/coverage.info' # Coverlet generates a random GUID folder in the TestResults directory and names the lcov file 'coverage.info'
        format: lcov
